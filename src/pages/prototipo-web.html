<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Riego Automático — Prototipo</title>
  <style>
    :root {
      --bg: #f1f5f4;
      --panel: #ffffff;
      --panel-border: #d9e2e0;
      --text: #1b2a27;
      --text-soft: #5a6b67;
      --primary: #2e8b57;
      --primary-dark: #236b42;
      --primary-soft: #e6f2ec;
      --accent: #1d70a2;
      --danger: #c0392b;
      --danger-dark: #962d22;
      --warning: #d98b1f;
      --idle: #6c7a78;
      --running: #2e8b57;
      --stop: #c0392b;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      --radius: 10px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      font-size: 15px;
      line-height: 1.4;
    }

    header {
      background: var(--primary);
      color: #fff;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .header-time {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.15);
      padding: 0.35rem 0.75rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .header-time:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .header-time .time-value {
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }

    .header-time .pencil {
      font-size: 0.9rem;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .header-time:hover .pencil {
      opacity: 1;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255, 255, 255, 0.15);
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #aaa;
    }

    .status-dot.idle    { background: #cfd6d4; }
    .status-dot.running { background: #7ee2a8; animation: pulse 1.4s ease-in-out infinite; }
    .status-dot.stop    { background: #ff8070; }

    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(1.3); }
    }

    .demo-banner {
      background: var(--warning);
      color: #fff;
      text-align: center;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.25rem;
      display: grid;
      gap: 1.25rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
    }

    .card h2 {
      margin: 0 0 1rem 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* --- Estado en tiempo real ----------------------------------------- */

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
    }

    .status-cell {
      background: var(--primary-soft);
      border-radius: 8px;
      padding: 0.75rem;
    }

    .status-cell .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: var(--text-soft);
      letter-spacing: 0.5px;
      margin-bottom: 0.25rem;
    }

    .status-cell .value {
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text);
    }

    .status-cell .value.big {
      font-size: 1.6rem;
      color: var(--primary-dark);
    }

    .pump-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      cursor: default;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      transition: background 0.2s ease;
      user-select: none;
    }

    .pump-indicator:hover {
      background: transparent;
    }

    .pump-indicator:active .dot {
      transform: none;
    }

    .pump-indicator .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ccc;
      transition: transform 0.15s;
    }

    .pump-indicator.on .dot { background: var(--primary); box-shadow: 0 0 6px var(--primary); }

    /* --- Sectores ------------------------------------------------------ */

    .sectors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 0.65rem;
    }

    .sector {
      background: #f8faf9;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 0.65rem;
      text-align: center;
      transition: all 0.2s ease;
      cursor: pointer;
      user-select: none;
    }

    .sector:hover {
      border-color: var(--primary);
      background: #f0f5f3;
    }

    .sector .name {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-soft);
      text-transform: uppercase;
    }

    .sector .icon {
      font-size: 1.8rem;
      margin: 0.25rem 0;
      color: #c8d2d0;
    }

    .sector.active {
      background: var(--primary);
      border-color: var(--primary-dark);
      color: #fff;
      box-shadow: 0 0 8px rgba(46, 139, 87, 0.4);
    }

    .sector .icon {
      transition: transform 0.15s;
    }

    .sector:active .icon {
      transform: scale(1.15);
    }

    .sector.active .name { color: #e8f5ed; }
    .sector.active .icon { color: #fff; }

    /* --- Botones ------------------------------------------------------- */

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.65rem 1.1rem;
      border-radius: 8px;
      border: 1px solid transparent;
      background: var(--primary);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.05s;
    }
    .btn:hover   { background: var(--primary-dark); }
    .btn:active  { transform: translateY(1px); }

    .btn.secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--panel-border);
    }
    .btn.secondary:hover { background: #f4f6f5; }

    .btn.danger       { background: var(--danger); }
    .btn.danger:hover { background: var(--danger-dark); }

    .btn.small {
      padding: 0.4rem 0.7rem;
      font-size: 0.8rem;
    }

    .btn-stop {
      width: 100%;
      padding: 1rem;
      font-size: 1.05rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* --- Programas ----------------------------------------------------- */

    .programs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .programs-list {
      display: grid;
      gap: 0.75rem;
    }

    .program-item {
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 0.9rem;
      background: #fcfdfd;
    }

    .program-item.active {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .program-item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .program-title {
      font-weight: 600;
      font-size: 1rem;
    }

    .program-meta {
      font-size: 0.8rem;
      color: var(--text-soft);
      margin-top: 0.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .program-meta span::before {
      content: "• ";
      color: var(--primary);
    }

    .program-actions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .program-sectors {
      margin-top: 0.65rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .chip {
      background: #fff;
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
      color: var(--text-soft);
    }

    .program-item.active .chip { background: #fff; }

    /* --- Formulario de programa --------------------------------------- */

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.85rem;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .form-field label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .form-field input[type="text"],
    .form-field input[type="time"],
    .form-field input[type="number"],
    .form-field select {
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      padding: 0.55rem 0.7rem;
      font-size: 0.9rem;
      background: #fff;
      color: var(--text);
      font-family: inherit;
    }

    .form-field input:focus,
    .form-field select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-soft);
    }

    .days-picker {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .day-toggle {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--panel-border);
      background: #fff;
      color: var(--text-soft);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .day-toggle.on {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .sector-config-list {
      display: grid;
      gap: 0.5rem;
    }

    .sector-config-row {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0.7rem;
      background: #f8faf9;
      border: 1px solid var(--panel-border);
      border-radius: 6px;
    }

    .sector-config-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .sector-config-row .sector-name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .sector-config-row input[type="number"] {
      width: 72px;
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      padding: 0.35rem 0.5rem;
      font-size: 0.85rem;
      text-align: right;
    }

    .sector-config-row .unit {
      font-size: 0.75rem;
      color: var(--text-soft);
    }

    /* --- Time Editor Modal ------------------------------------------------- */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: var(--panel);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: 90%;
      max-width: 450px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .datetime-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .modal-body .form-field {
      margin: 0;
    }

    .modal-body input[type="date"],
    .modal-body input[type="time"] {
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      padding: 0.75rem;
      font-size: 1rem;
      background: #fff;
      color: var(--text);
      font-family: inherit;
      width: 100%;
    }

    .modal-body input[type="date"]:focus,
    .modal-body input[type="time"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-soft);
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .modal-actions .btn {
      padding: 0.65rem 1.2rem;
      font-size: 0.9rem;
      min-width: 100px;
    }

    .form-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* --- Toast --------------------------------------------------------- */

    #toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: var(--text);
      color: #fff;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-size: 0.9rem;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease;
      z-index: 1000;
      max-width: 90%;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--danger); }

    /* --- Sección colapsable ------------------------------------------- */

    .collapsible-header {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .collapsible-header::after {
      content: "▾";
      color: var(--text-soft);
      transition: transform 0.2s;
    }

    .card.collapsed .collapsible-header::after {
      transform: rotate(-90deg);
    }

    .card.collapsed .collapsible-body {
      display: none;
    }

    .muted {
      color: var(--text-soft);
      font-size: 0.85rem;
      font-style: italic;
    }

    /* --- Mobile -------------------------------------------------------- */

    @media (max-width: 540px) {
      header h1 { font-size: 1rem; }
      main { padding: 0.9rem; gap: 0.9rem; }
      .card { padding: 1rem; }
      .sector-config-row {
        grid-template-columns: auto 1fr;
        grid-template-areas:
          "check name"
          "time  time";
      }
      .sector-config-row input[type="checkbox"] { grid-area: check; }
      .sector-config-row .sector-name           { grid-area: name; }
      .sector-config-row .time-wrapper {
        grid-area: time;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>

  <div class="demo-banner">
    PROTOTIPO — datos simulados, no requiere ESP32
  </div>

  <header>
    <h1>Sistema de Riego Automático</h1>
    <div class="status-badge">
      <span id="statusDot" class="status-dot idle"></span>
      <span id="statusLabel">Inactivo</span>
    </div>
    <div id="headerTime" class="header-time" title="Click para editar la hora">
      <span class="time-value" id="timeValue">--:--</span>
      <span class="pencil">✎</span>
    </div>
  </header>

  <main>

    <!-- ============ Estado en tiempo real ============ -->
    <section class="card">
      <h2>Estado actual</h2>
      <div class="status-grid">
        <div class="status-cell">
          <div class="label">Programa activo</div>
          <div class="value" id="activeProgram">—</div>
        </div>
        <div class="status-cell">
          <div class="label">Sectores activos</div>
          <div class="value" id="activeSector">—</div>
        </div>
        <div class="status-cell">
          <div class="label">Tiempo restante</div>
          <div class="value big" id="remainingTime">00:00</div>
        </div>
        <div class="status-cell">
          <div class="label">Bomba</div>
          <div class="value">
            <span id="pumpIndicator" class="pump-indicator" title="La bomba sigue automaticamente a los sectores activos">
              <span class="dot"></span><span id="pumpLabel">Apagada</span>
            </span>
          </div>
        </div>
      </div>

      <div style="margin-top: 1rem;">
        <div class="label" style="font-size: 0.7rem; text-transform: uppercase; color: var(--text-soft); margin-bottom: 0.5rem;">
          Sectores
        </div>
        <div id="sectorsGrid" class="sectors-grid"></div>
      </div>
    </section>

    <!-- ============ Parada manual ============ -->
    <section class="card">
      <button id="btnStop" class="btn danger btn-stop">⏹ Parada manual inmediata</button>
    </section>

    <!-- ============ Programas guardados ============ -->
    <section class="card">
      <div class="programs-header">
        <h2 style="margin: 0;">Programas guardados</h2>
        <button id="btnNewProgram" class="btn small">＋ Nuevo programa</button>
      </div>
      <div id="programsList" class="programs-list">
        <p class="muted">Cargando programas…</p>
      </div>
    </section>

    <!-- ============ Editor de programa ============ -->
    <section id="editorCard" class="card collapsed">
      <h2 class="collapsible-header" id="editorToggle">
        <span id="editorTitle">Nuevo programa</span>
      </h2>
      <div class="collapsible-body">
        <form id="programForm" onsubmit="return false;">
          <input type="hidden" id="programId" value="">

          <div class="form-grid">
            <div class="form-field">
              <label for="startTime">Hora de inicio</label>
              <input type="time" id="startTime" value="07:00" required>
            </div>

            <div class="form-field">
              <label for="delayBetween">Retardo entre sectores (s)</label>
              <input type="number" id="delayBetween" min="0" max="3600" value="5">
            </div>

            <div class="form-field">
              <label for="cyclic">Repetición</label>
              <select id="cyclic">
                <option value="false">Ejecución única</option>
                <option value="true">Cíclica</option>
              </select>
            </div>
          </div>

          <div class="form-field" style="margin-top: 1rem;">
            <label>Días de ejecución</label>
            <div class="days-picker" id="daysPicker">
              <button type="button" class="day-toggle" data-bit="0">L</button>
              <button type="button" class="day-toggle" data-bit="1">M</button>
              <button type="button" class="day-toggle" data-bit="2">X</button>
              <button type="button" class="day-toggle" data-bit="3">J</button>
              <button type="button" class="day-toggle" data-bit="4">V</button>
              <button type="button" class="day-toggle" data-bit="5">S</button>
              <button type="button" class="day-toggle" data-bit="6">D</button>
            </div>
          </div>

          <div class="form-field" style="margin-top: 1rem;">
            <label>Sectores incluidos y tiempo de riego</label>
            <div id="sectorConfigList" class="sector-config-list"></div>
          </div>

          <div class="form-actions">
            <button type="button" id="btnCancel"   class="btn secondary">Cancelar</button>
            <button type="button" id="btnSaveProg" class="btn">Guardar programa</button>
          </div>
        </form>
      </div>
    </section>

    <!-- ============ Time Editor Modal ============ -->
    <div id="timeEditorModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">🗓️ Establecer fecha y hora</div>
        <div class="modal-body">
          <div class="datetime-row">
            <div class="form-field">
              <label for="timeEditorDate" style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-soft);">Fecha</label>
              <input type="date" id="timeEditorDate" value="2024-01-01">
            </div>
            <div class="form-field">
              <label for="timeEditorTime" style="font-size: 0.75rem; text-transform: uppercase; color: var(--text-soft);">Hora</label>
              <input type="time" id="timeEditorTime" step="1" value="00:00:00">
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" id="btnTimeCancel" class="btn secondary">✕ Cancelar</button>
          <button type="button" id="btnTimeSave" class="btn">✓ Guardar</button>
        </div>
      </div>
    </div>

  </main>

  <div id="toast"></div>

  <script>
    // ==================================================================
    // PROTOTIPO — Sistema de Riego Automático
    // ------------------------------------------------------------------
    // Versión 100% standalone con datos hardcodeados. Pensada para
    // validar la interfaz sin necesidad del firmware del ESP32.
    // ==================================================================

    const NUM_SECTORS      = 8;
    const POLL_INTERVAL_MS = 1000;

    // --- Estado de la UI ---------------------------------------------
    let programs         = [];
    let editingId        = null;
    let selectedDays     = 0; // bitmask: bit0=L … bit6=D
    let manualSectorMask = 0;

    // --- Datos simulados ---------------------------------------------
    const fakeState = {
      estado: "RUNNING",
      programaActivo: 1,
      sectorActivo: 3,
      sectoresActivos: [3],
      tiempoRestante: 95,
      bomba: true,
      modoManual: false,
      manualSectorMask: 0
    };

    const STORAGE_KEY = "riego.programas.v1";

    const DEFAULT_SEED = {
      programas: [
        {
          id: 1, horaInicio: "07:00", dias: 62,
          retardoEntreSectores: 5, ciclico: true,
          sectores: [
            { id: 1, activo: true,  tiempoRiego: 60  },
            { id: 2, activo: true,  tiempoRiego: 90  },
            { id: 3, activo: true,  tiempoRiego: 120 },
            { id: 4, activo: false, tiempoRiego: 60  },
            { id: 5, activo: true,  tiempoRiego: 45  },
            { id: 6, activo: false, tiempoRiego: 60  },
            { id: 7, activo: false, tiempoRiego: 60  },
            { id: 8, activo: false, tiempoRiego: 60  }
          ]
        },
        {
          id: 2, horaInicio: "19:30", dias: 96,
          retardoEntreSectores: 10, ciclico: false,
          sectores: [
            { id: 1, activo: false, tiempoRiego: 60  },
            { id: 2, activo: false, tiempoRiego: 60  },
            { id: 3, activo: false, tiempoRiego: 60  },
            { id: 4, activo: true,  tiempoRiego: 180 },
            { id: 5, activo: false, tiempoRiego: 60  },
            { id: 6, activo: true,  tiempoRiego: 180 },
            { id: 7, activo: false, tiempoRiego: 60  },
            { id: 8, activo: true,  tiempoRiego: 90  }
          ]
        },
        {
          id: 3, horaInicio: "12:00", dias: 127,
          retardoEntreSectores: 3, ciclico: false,
          sectores: [
            { id: 1, activo: false, tiempoRiego: 60 },
            { id: 2, activo: false, tiempoRiego: 60 },
            { id: 3, activo: false, tiempoRiego: 60 },
            { id: 4, activo: false, tiempoRiego: 60 },
            { id: 5, activo: false, tiempoRiego: 60 },
            { id: 6, activo: false, tiempoRiego: 60 },
            { id: 7, activo: true,  tiempoRiego: 30 },
            { id: 8, activo: false, tiempoRiego: 60 }
          ]
        }
      ]
    };

    function fromStorageFormat(raw) {
      const sectores = (raw.sectores || [])
        .filter((s) => s.activo)
        .map((s, idx) => ({
          id: Number(s.id),
          orden: idx + 1,
          tiempoRiego: Number(s.tiempoRiego) || 0
        }));
      return {
        id: Number(raw.id),
        horaInicio: raw.horaInicio,
        dias: Number(raw.dias) || 0,
        retardoEntreSectores: Number(raw.retardoEntreSectores) || 0,
        ciclico: !!raw.ciclico,
        sectores
      };
    }

    function toStorageFormat(prog) {
      const byId = new Map(prog.sectores.map((s) => [s.id, s]));
      const sectores = [];
      for (let i = 1; i <= NUM_SECTORS; i++) {
        const active = byId.get(i);
        sectores.push({
          id: i,
          activo: !!active,
          tiempoRiego: active ? active.tiempoRiego : 60
        });
      }
      return {
        id: prog.id,
        horaInicio: prog.horaInicio,
        dias: prog.dias,
        retardoEntreSectores: prog.retardoEntreSectores,
        ciclico: prog.ciclico,
        sectores
      };
    }

    const Api = {
      async getProgramas() {
        let raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          raw = JSON.stringify(DEFAULT_SEED);
          localStorage.setItem(STORAGE_KEY, raw);
        }
        try {
          const data = JSON.parse(raw);
          return (data.programas || []).map(fromStorageFormat);
        } catch (err) {
          console.warn("Storage corrupto, reseeding:", err);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_SEED));
          return DEFAULT_SEED.programas.map(fromStorageFormat);
        }
      },

      async saveProgramas(list) {
        const payload = { programas: list.map(toStorageFormat) };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      }
    };

    // --- RTC simulado: parte del reloj real del navegador ------------
    let fakeRTCOffsetMs = 0;

    function getFakeRTC() {
      const now = new Date(Date.now() + fakeRTCOffsetMs);
      return {
        year: now.getFullYear(),
        month: now.getMonth() + 1,
        day: now.getDate(),
        hour: now.getHours(),
        minute: now.getMinutes(),
        second: now.getSeconds(),
        dayOfWeek: now.getDay(),
        running: true
      };
    }

    // --- Helpers ------------------------------------------------------
    const $  = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    function toast(msg, isError = false) {
      const t = $("#toast");
      t.textContent = msg;
      t.classList.toggle("error", isError);
      t.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => t.classList.remove("show"), 2800);
    }

    function formatTime(seconds) {
      if (seconds == null || seconds < 0) return "00:00";
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function formatDateTime(rtcData) {
      if (!rtcData) return "--:-- --/--/--";
      const d = String(rtcData.day).padStart(2, "0");
      const m = String(rtcData.month).padStart(2, "0");
      const y = String(rtcData.year).slice(-2);
      const h = String(rtcData.hour).padStart(2, "0");
      const min = String(rtcData.minute).padStart(2, "0");
      return `${h}:${min} ${d}/${m}/${y}`;
    }

    function normalizeActiveSectors(data) {
      if (Array.isArray(data.sectoresActivos)) {
        return data.sectoresActivos
          .map(Number)
          .filter((id) => id >= 1 && id <= NUM_SECTORS);
      }
      const sectors = [];
      if (data.sectorActivo) sectors.push(Number(data.sectorActivo));
      return sectors;
    }

    function isManualSectorActive(sectorId) {
      return (manualSectorMask & (1 << (sectorId - 1))) !== 0;
    }

    function daysMaskToLabel(mask) {
      const labels = ["L", "M", "X", "J", "V", "S", "D"];
      const out = [];
      for (let i = 0; i < 7; i++) {
        if (mask & (1 << i)) out.push(labels[i]);
      }
      return out.length ? out.join(" ") : "Sin días";
    }

    // --- Simulación del avance del riego -----------------------------
    function tickFakeIrrigation() {
      if (fakeState.estado !== "RUNNING") return;
      if (fakeState.tiempoRestante > 0) {
        fakeState.tiempoRestante -= 1;
        return;
      }
      // Avanza al próximo sector del programa activo
      const prog = programs.find((p) => p.id === fakeState.programaActivo);
      if (!prog || !prog.sectores.length) {
        fakeState.estado = "IDLE";
        fakeState.sectorActivo = 0;
        fakeState.sectoresActivos = [];
        fakeState.bomba = false;
        return;
      }
      const currentIdx = prog.sectores.findIndex((s) => s.id === fakeState.sectorActivo);
      const nextIdx = currentIdx + 1;
      if (nextIdx >= prog.sectores.length) {
        if (prog.ciclico) {
          fakeState.sectorActivo = prog.sectores[0].id;
          fakeState.sectoresActivos = [prog.sectores[0].id];
          fakeState.tiempoRestante = prog.sectores[0].tiempoRiego;
        } else {
          fakeState.estado = "IDLE";
          fakeState.programaActivo = 0;
          fakeState.sectorActivo = 0;
          fakeState.sectoresActivos = [];
          fakeState.tiempoRestante = 0;
          fakeState.bomba = false;
        }
      } else {
        fakeState.sectorActivo = prog.sectores[nextIdx].id;
        fakeState.sectoresActivos = [prog.sectores[nextIdx].id];
        fakeState.tiempoRestante = prog.sectores[nextIdx].tiempoRiego;
      }
    }

    // --- Render: Estado ----------------------------------------------
    function renderStatus(data) {
      const state = data.modoManual ? "MANUAL" : (data.estado || "IDLE");

      const statusMap = {
        IDLE:        { label: "Inactivo",     cls: "idle"    },
        MANUAL:      { label: "Manual",       cls: "running" },
        RUNNING:     { label: "En ejecución", cls: "running" },
        MANUAL_STOP: { label: "Detenido",     cls: "stop"    }
      };
      const s = statusMap[state] || statusMap.IDLE;
      $("#statusLabel").textContent = s.label;
      $("#statusDot").className = "status-dot " + s.cls;

      const activeSectors = normalizeActiveSectors(data);
      const allActive = activeSectors.slice();
      for (let i = 1; i <= NUM_SECTORS; i++) {
        if (isManualSectorActive(i) && !allActive.includes(i)) {
          allActive.push(i);
        }
      }

      $("#activeProgram").textContent =
        data.programaActivo ? `#${data.programaActivo}` : "—";
      $("#activeSector").textContent =
        allActive.length ? allActive.map((id) => `S${id}`).join(", ") : "—";
      $("#remainingTime").textContent = formatTime(data.tiempoRestante);

      const pumpOn = !!data.bomba || manualSectorMask !== 0;
      const pump = $("#pumpIndicator");
      pump.classList.toggle("on", pumpOn);
      $("#pumpLabel").textContent = pumpOn ? "Encendida" : "Apagada";

      $$(".sector").forEach((el) => {
        const id = parseInt(el.dataset.id, 10);
        el.classList.toggle("active", allActive.includes(id));
      });
    }

    function buildSectorsGrid() {
      const grid = $("#sectorsGrid");
      grid.innerHTML = "";
      for (let i = 1; i <= NUM_SECTORS; i++) {
        const el = document.createElement("div");
        el.className = "sector";
        el.dataset.id = i;
        el.innerHTML = `
          <div class="name">Sector ${i}</div>
          <div class="icon">◉</div>
        `;
        el.addEventListener("click", () => toggleSectorManual(i));
        grid.appendChild(el);
      }
    }

    function toggleSectorManual(sectorId) {
      const mask = 1 << (sectorId - 1);
      if (manualSectorMask & mask) {
        manualSectorMask &= ~mask;
      } else {
        manualSectorMask |= mask;
        // Activar manualmente detiene el programa en curso
        fakeState.estado = "IDLE";
        fakeState.programaActivo = 0;
        fakeState.sectorActivo = 0;
        fakeState.sectoresActivos = [];
        fakeState.tiempoRestante = 0;
        fakeState.bomba = false;
      }
      fakeState.modoManual = manualSectorMask !== 0;
      fakeState.manualSectorMask = manualSectorMask;
      refreshStatus();
      toast(
        (manualSectorMask & mask)
          ? `Sector ${sectorId} encendido manualmente`
          : `Sector ${sectorId} apagado`
      );
    }

    // --- Render: Programas -------------------------------------------
    function renderPrograms(list, activeId) {
      const container = $("#programsList");
      if (!list.length) {
        container.innerHTML = '<p class="muted">No hay programas configurados.</p>';
        return;
      }
      container.innerHTML = "";
      list.forEach((p) => {
        const item = document.createElement("div");
        item.className = "program-item" + (p.id === activeId ? " active" : "");

        const sectorChips = p.sectores
          .slice()
          .sort((a, b) => a.orden - b.orden)
          .map(
            (s) =>
              `<span class="chip">S${s.id} · ${formatTime(s.tiempoRiego)}</span>`
          )
          .join("");

        item.innerHTML = `
          <div class="program-item-header">
            <div>
              <div class="program-title">Programa #${p.id} · ${p.horaInicio}</div>
              <div class="program-meta">
                <span>${daysMaskToLabel(p.dias)}</span>
                <span>Retardo ${p.retardoEntreSectores}s</span>
                <span>${p.ciclico ? "Cíclico" : "Ejecución única"}</span>
              </div>
            </div>
            <div class="program-actions">
              <button class="btn small secondary" data-action="edit"   data-id="${p.id}">Editar</button>
              <button class="btn small"           data-action="run"    data-id="${p.id}">Ejecutar</button>
              <button class="btn small danger"    data-action="delete" data-id="${p.id}">Borrar</button>
            </div>
          </div>
          <div class="program-sectors">${sectorChips}</div>
        `;
        container.appendChild(item);
      });
    }

    // --- Editor de programas -----------------------------------------
    function buildSectorConfigList() {
      const list = $("#sectorConfigList");
      list.innerHTML = "";
      for (let i = 1; i <= NUM_SECTORS; i++) {
        const row = document.createElement("div");
        row.className = "sector-config-row";
        row.innerHTML = `
          <input type="checkbox" id="sec_${i}_enabled" data-sector="${i}">
          <label class="sector-name" for="sec_${i}_enabled">Sector ${i}</label>
          <div class="time-wrapper">
            <input type="number" id="sec_${i}_time" min="0" max="3600" value="60" disabled>
            <span class="unit">seg</span>
          </div>
        `;
        list.appendChild(row);

        row.querySelector('input[type="checkbox"]').addEventListener("change", (e) => {
          const t = $(`#sec_${i}_time`);
          t.disabled = !e.target.checked;
        });
      }
    }

    function openEditor(program) {
      $("#editorCard").classList.remove("collapsed");
      $("#editorCard").scrollIntoView({ behavior: "smooth", block: "start" });

      if (program) {
        editingId = program.id;
        $("#editorTitle").textContent = `Editar programa #${program.id}`;
        $("#programId").value          = program.id;
        $("#startTime").value          = program.horaInicio;
        $("#delayBetween").value       = program.retardoEntreSectores;
        $("#cyclic").value             = program.ciclico ? "true" : "false";
        selectedDays                   = program.dias;
        updateDaysUI();
        for (let i = 1; i <= NUM_SECTORS; i++) {
          $(`#sec_${i}_enabled`).checked = false;
          $(`#sec_${i}_time`).value = 60;
          $(`#sec_${i}_time`).disabled = true;
        }
        program.sectores.forEach((s) => {
          const cb = $(`#sec_${s.id}_enabled`);
          const ti = $(`#sec_${s.id}_time`);
          if (cb && ti) {
            cb.checked = true;
            ti.disabled = false;
            ti.value = s.tiempoRiego;
          }
        });
      } else {
        editingId = null;
        $("#editorTitle").textContent = "Nuevo programa";
        $("#programId").value    = "";
        $("#startTime").value    = "07:00";
        $("#delayBetween").value = 5;
        $("#cyclic").value       = "false";
        selectedDays = 0;
        updateDaysUI();
        for (let i = 1; i <= NUM_SECTORS; i++) {
          $(`#sec_${i}_enabled`).checked = false;
          $(`#sec_${i}_time`).value = 60;
          $(`#sec_${i}_time`).disabled = true;
        }
      }
    }

    function closeEditor() {
      $("#editorCard").classList.add("collapsed");
      editingId = null;
    }

    function updateDaysUI() {
      $$("#daysPicker .day-toggle").forEach((btn) => {
        const bit = parseInt(btn.dataset.bit, 10);
        btn.classList.toggle("on", (selectedDays & (1 << bit)) !== 0);
      });
    }

    function collectProgramFromForm() {
      const sectores = [];
      let orden = 1;
      for (let i = 1; i <= NUM_SECTORS; i++) {
        if ($(`#sec_${i}_enabled`).checked) {
          sectores.push({
            id: i,
            orden: orden++,
            tiempoRiego: parseInt($(`#sec_${i}_time`).value, 10) || 0
          });
        }
      }
      return {
        id: editingId || null,
        horaInicio:           $("#startTime").value,
        dias:                 selectedDays,
        retardoEntreSectores: parseInt($("#delayBetween").value, 10) || 0,
        ciclico:              $("#cyclic").value === "true",
        sectores
      };
    }

    async function saveProgram() {
      const prog = collectProgramFromForm();
      if (!prog.horaInicio) {
        toast("Indicá una hora de inicio", true);
        return;
      }
      if (!prog.dias) {
        toast("Elegí al menos un día", true);
        return;
      }
      if (!prog.sectores.length) {
        toast("Agregá al menos un sector", true);
        return;
      }

      if (prog.id) {
        const idx = programs.findIndex((p) => p.id === prog.id);
        if (idx >= 0) programs[idx] = prog;
      } else {
        prog.id = programs.length
          ? Math.max(...programs.map((p) => p.id)) + 1
          : 1;
        programs.push(prog);
      }
      await persistPrograms();
      toast("Programa guardado");
      closeEditor();
      loadPrograms();
    }

    async function loadPrograms() {
      programs = await Api.getProgramas();
      renderPrograms(programs, fakeState.programaActivo || 0);
    }

    async function persistPrograms() {
      await Api.saveProgramas(programs);
    }

    function runProgram(id) {
      const p = programs.find((x) => x.id === id);
      if (!p || !p.sectores.length) {
        toast("Programa sin sectores", true);
        return;
      }
      manualSectorMask = 0;
      fakeState.estado = "RUNNING";
      fakeState.programaActivo = id;
      fakeState.sectorActivo = p.sectores[0].id;
      fakeState.sectoresActivos = [p.sectores[0].id];
      fakeState.tiempoRestante = p.sectores[0].tiempoRiego;
      fakeState.bomba = true;
      fakeState.modoManual = false;
      fakeState.manualSectorMask = 0;
      toast(`Ejecutando programa #${id}`);
      loadPrograms();
      refreshStatus();
    }

    async function deleteProgram(id) {
      if (!confirm(`¿Borrar el programa #${id}?`)) return;
      const idx = programs.findIndex((p) => p.id === id);
      if (idx >= 0) programs.splice(idx, 1);
      if (fakeState.programaActivo === id) {
        fakeState.estado = "IDLE";
        fakeState.programaActivo = 0;
        fakeState.sectorActivo = 0;
        fakeState.sectoresActivos = [];
        fakeState.tiempoRestante = 0;
        fakeState.bomba = false;
      }
      await persistPrograms();
      toast("Programa borrado");
      loadPrograms();
      refreshStatus();
    }

    function manualStop() {
      if (!confirm("¿Confirmás la parada manual inmediata?")) return;
      manualSectorMask = 0;
      fakeState.estado = "MANUAL_STOP";
      fakeState.programaActivo = 0;
      fakeState.sectorActivo = 0;
      fakeState.sectoresActivos = [];
      fakeState.tiempoRestante = 0;
      fakeState.bomba = false;
      fakeState.modoManual = false;
      fakeState.manualSectorMask = 0;
      toast("Sistema detenido");
      refreshStatus();
    }

    // --- Time editor -------------------------------------------------
    function openTimeEditor(rtcData) {
      if (!rtcData) return;
      const dateStr = String(rtcData.year).padStart(4, '0') + '-' +
                      String(rtcData.month).padStart(2, '0') + '-' +
                      String(rtcData.day).padStart(2, '0');
      const timeStr = String(rtcData.hour).padStart(2, '0') + ':' +
                      String(rtcData.minute).padStart(2, '0') + ':' +
                      String(rtcData.second).padStart(2, '0');
      $("#timeEditorDate").value = dateStr;
      $("#timeEditorTime").value = timeStr;
      $("#timeEditorModal").classList.add("show");
    }

    function closeTimeEditor() {
      $("#timeEditorModal").classList.remove("show");
    }

    function saveRTCTime() {
      const dateVal = $("#timeEditorDate").value;
      const timeVal = $("#timeEditorTime").value;
      if (!dateVal || !timeVal) {
        toast("Por favor selecciona fecha y hora", true);
        return;
      }
      const [year, month, day] = dateVal.split('-').map(Number);
      const parts = timeVal.split(':').map(Number);
      const hour = parts[0];
      const minute = parts[1];
      const second = parts[2] || 0;

      const desired = new Date(year, month - 1, day, hour, minute, second).getTime();
      fakeRTCOffsetMs = desired - Date.now();

      toast("✓ Hora configurada correctamente");
      closeTimeEditor();
      refreshTime();
    }

    function refreshTime() {
      const rtc = getFakeRTC();
      $("#timeValue").textContent = formatDateTime(rtc);
    }

    // --- Polling ------------------------------------------------------
    function refreshStatus() {
      tickFakeIrrigation();
      renderStatus(fakeState);
    }

    // --- Bootstrap ----------------------------------------------------
    function wireEvents() {
      $$("#daysPicker .day-toggle").forEach((btn) => {
        btn.addEventListener("click", () => {
          const bit = parseInt(btn.dataset.bit, 10);
          selectedDays ^= (1 << bit);
          updateDaysUI();
        });
      });

      $("#btnSaveProg").addEventListener("click", saveProgram);
      $("#btnCancel").addEventListener("click", closeEditor);
      $("#btnNewProgram").addEventListener("click", () => openEditor(null));

      $("#editorToggle").addEventListener("click", () => {
        $("#editorCard").classList.toggle("collapsed");
      });

      $("#btnStop").addEventListener("click", manualStop);

      $("#programsList").addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-action]");
        if (!btn) return;
        const id = parseInt(btn.dataset.id, 10);
        const action = btn.dataset.action;
        if (action === "edit") {
          const prog = programs.find((p) => p.id === id);
          if (prog) openEditor(prog);
        } else if (action === "run") {
          runProgram(id);
        } else if (action === "delete") {
          deleteProgram(id);
        }
      });

      $("#headerTime").addEventListener("click", () => {
        openTimeEditor(getFakeRTC());
      });

      $("#btnTimeCancel").addEventListener("click", closeTimeEditor);
      $("#btnTimeSave").addEventListener("click", saveRTCTime);

      $("#timeEditorModal").addEventListener("click", (e) => {
        if (e.target === $("#timeEditorModal")) {
          closeTimeEditor();
        }
      });
    }

    async function init() {
      buildSectorsGrid();
      buildSectorConfigList();
      wireEvents();
      await loadPrograms();
      refreshStatus();
      refreshTime();
      setInterval(refreshStatus, POLL_INTERVAL_MS);
      setInterval(refreshTime,  POLL_INTERVAL_MS);
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
